apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-active-image-tracker.fullname" . }}
  labels:
    {{- include "k8s-active-image-tracker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-active-image-tracker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "k8s-active-image-tracker.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "k8s-active-image-tracker.serviceAccountName" . }}
      containers:
        - name: tracker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.healthProbe.enabled }}
          ports:
            - name: health
              containerPort: {{ .Values.healthProbe.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: {{ .Values.healthProbe.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthProbe.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: {{ .Values.healthProbe.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthProbe.readiness.periodSeconds }}
          {{- end }}
          args:
            {{- if .Values.tracker.namespaces }}
            - --namespaces={{ join "," .Values.tracker.namespaces }}
            {{- end }}
            {{- if .Values.tracker.registries }}
            - --registries={{ join "," .Values.tracker.registries }}
            {{- end }}
            - --tag-prefix={{ .Values.tracker.tagPrefix }}
            - --workers={{ .Values.tracker.workers }}
            - --health-probe-bind-address={{ ternary (printf ":%v" .Values.healthProbe.port) "0" .Values.healthProbe.enabled }}
            {{- if .Values.tracker.verbose }}
            - --verbose
            {{- end }}
            {{- if .Values.tracker.dryRun }}
            - --dry-run
            {{- end }}
            {{- with .Values.tracker.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
