replicaCount: 1

image:
  repository: ghcr.io/agologan/k8s-active-image-tracker
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

rbac:
  create: true

podAnnotations: {}
podLabels: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

tracker:
  namespaces: []
  registry: ""
  tagPrefix: active
  workers: 4
  verbose: false
  dryRun: false
  extraArgs: []

healthProbe:
  enabled: true
  port: 8081
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 2
    periodSeconds: 5
